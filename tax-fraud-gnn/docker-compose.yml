version: '3.8'
services:
  neo4j:
    image: neo4j:5.12
    environment:
      NEO4J_AUTH: "neo4j/neo4j"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Enable the Graph Data Science plugin via labs plugins
      NEO4JLABS_PLUGINS: '["graph-data-science"]'
      # Optional memory settings - tune if you have more RAM
      NEO4J_dbms_memory_pagecache_size: "1G"
      NEO4J_dbms_memory_heap_initial__size: "2G"
      NEO4J_dbms_memory_heap_max__size: "4G"
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
      - ./neo4j_import:/var/lib/neo4j/import
      - ./neo4j_plugins:/plugins
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
